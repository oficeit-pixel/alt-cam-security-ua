name: ALT-CAM Social Publisher

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alt-cam-social-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      META_GRAPH_VERSION: v21.0
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      DRY_RUN: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r social-posts/meta-automation/requirements.txt

      - name: Publish due posts
        run: python social-posts/meta-automation/publish_due.py

      - name: Save publication state
        if: always()
        run: |
          if [ -f social-posts/meta-automation/state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f social-posts/meta-automation/state.json
            if ! git diff --cached --quiet; then
              git commit -m "Update social publisher state [skip ci]"
              git push
            fi
          fi
