<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>TikTok OAuth Callback — ALT-CAM Security UA</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --card: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f5f7;
      --muted: #86868b;
      --accent: #ffcc00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 204, 0, 0.16), transparent 34rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      padding: 32px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -0.04em;
    }

    p { color: var(--muted); line-height: 1.6; }

    code {
      display: block;
      overflow-wrap: anywhere;
      padding: 16px;
      margin-top: 18px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.34);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>TikTok authorization received</h1>
    <p>Це службова сторінка ALT-CAM Security UA для підключення TikTok. Якщо TikTok повернув код авторизації, він показаний нижче.</p>
    <code id="code">Waiting for authorization code…</code>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error") || params.get("error_description");
    document.getElementById("code").textContent = code
      ? `code=${code}`
      : (error ? `error=${error}` : "No code found in URL.");
  </script>
</body>
</html>
